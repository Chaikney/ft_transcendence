# /etc/nginx/nginx.conf
user  nginx;
worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # add your servers here (paste your whole config inside this http { ... })
  server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    location / {
      return 301 https://$host:8443$request_uri;
    }
  }

  server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name example.com www.example.com;

    ssl_certificate     /etc/ssl/certs/transcendence.crt;
    ssl_certificate_key /etc/ssl/private/transcendence.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_session_timeout 1d;

    access_log /var/log/nginx/app_access.log;
    error_log  /var/log/nginx/app_error.log;

#  root /var/www/react/build;
  root /usr/share/nginx/html;
  index index.html;

  # SPA routing: serve index.html for unknown paths
  location / {
    try_files $uri $uri/ /index.html;
  }
    index index.html;

    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|ico|woff2?|ttf|eot)$ {
      try_files $uri =404;
      access_log off;
      expires 30d;
      add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location /api/ {
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Connection "";

      proxy_pass http://ruby:3000;
      proxy_read_timeout 90s;
      proxy_connect_timeout 10s;
      proxy_send_timeout 30s;
      proxy_buffering off;
    }

    location /cable {
      proxy_pass http://ruby:3000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 864;
    }

    location /index.html {
      try_files $uri =404;
    }

    location ~* /(config|\.env|\.git) {
      deny all;
      return 404;
    }
  }
}
