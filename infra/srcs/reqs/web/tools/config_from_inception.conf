upstream wpress {
    # Docker service name + port. If your php-fpm container is named "php" or "php-fpm:9000", update accordingly.
    server wpress:9000;
}

# This redirects all insecure connections to https
server {
    listen 80;
    listen [::]:80;
    server_name chaikney.42.fr;
	location / {
	return 301 https://$host$request_uri;
}
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name chaikney.42.fr;
	include snippets/self-signed.conf;
	# NOTE This must be the location where the WP code is mounted
	#root /var/lib/nginx/html;
	root /var/www/html/wordpress;
    index index.php index.html index.htm;
    # Serve static assets directly when present; otherwise fall back to index.php (WordPress front controller).
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # PHP-FPM handling: forward .php requests to the wpress/PHP upstream (in another container).
    # This block must exist so WordPress can execute PHP.
    location ~ \.php$ {
		# Split path for PATH_INFO support (some plugins may rely on it)
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        # Include standard fastcgi params (make sure fastcgi_params exists in your image)
		# TODO What is fastcgi_params?
        include fastcgi_params;

        # Use index.php as the default script
        fastcgi_index index.php;

        # Important: SCRIPT_FILENAME must point to the PHP file in the filesystem visible to php-fpm.
        # Using $document_root + $fastcgi_script_name is the common, portable approach.
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # Pass PATH_INFO through if present
		# NOTE similar to anove, do i care about this?
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # Pass request to the php-fpm upstream defined above.
        # If you didn't create an "upstream" block, you can also use "fastcgi_pass php-fpm:9000;" directly.
        fastcgi_pass wpress;

    }
	# NOTE these things seem non-essential but clearly useful
    # Serve common static asset types with long expiry headers for caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp)$ {
        try_files $uri =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Deny access to hidden files like .htaccess
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Optional: block access to readme, license, or other files if you want
    location = /readme.html {}
	}
